# MxmzaPro Configuration File
server:
  api_host: "0.0.0.0"
  api_port: 8000
  web_host: "0.0.0.0"
  web_port: 8081

proxy:
  default_timeout: 5
  max_workers: 50
  max_chain_length: 10
  
sources:
  - "https://free-proxy-list.net/"
  - "https://www.sslproxies.org/"
  - "https://www.us-proxy.org/"
  - "https://socks-proxy.net/"
  - "https://proxy-list.org/"

logging:
  level: "INFO"
  file: "mxmzapro.log"
